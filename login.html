<!DOCTYPE html>
<html>
 <head>

    <style>
       body {
       text-align: center;
       margin: 0;

       background-image: url("https://images.wallpapersden.com/image/download/frieren-hd-frieren-beyond-journey-s-end_bmdoamyUmZqaraWkpJRpamVlrWdsa2Y.jpg");

.blur{

footer {
 position: fixed;
 top: 90%;

 </head>
     <body>

      <section class="blur"> 
       <h1 style="color: aliceblue; font-size: 30px;  font-family: 'Poppins', sans-serif;">Login</h1>

  <input type="text" id="username" class="login" placeholder="Username"><br>
  <input type="password" id="password" class="login" placeholder="Password"><br>
  <button type="submit" class="btn">Login</button>
</form>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
function login() {
  let userInput = document.getElementById("username").value;
  let passInput = document.getElementById("password").value;

 const users = [
  {
    username: "a",
    password: "1",
    name: "Bluzzz",
    id: "461117788",
    icon: "https://i.pinimg.com/originals/ec/03/db/ec03dbdeb40d70a2d11a428a15a3ef2e.jpg",
    profile: "https://i.pinimg.com/originals/ec/03/db/ec03dbdeb40d70a2d11a428a15a3ef2e.jpg",
    img: "https://i.pinimg.com/736x/63/92/24/639224f094deff2ebf9cd261fba24004.jpg"
  },
  {
    username: "b",
    password: "2",

    profile: "https://i.pinimg.com/736x/ac/dd/f8/acddf8971f159f02893271d97d224486.jpg",

  }
];
  const user = users.find(u => 
    u.username === userInput && u.password === passInput
  );

  if (user) {
    localStorage.setItem("name", user.name);
    localStorage.setItem("id", user.id);
    localStorage.setItem("username", user.username);

    localStorage.setItem("icon", user.icon);
  localStorage.setItem("profile", user.profile);
  localStorage.setItem("img", user.img);

    window.location.href = "home.html";
  } else {
    alert("Salah!");
  }

  return false;
}
</script>
