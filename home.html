<script>
let index = 0;

const slides = document.getElementById("slides");
const total = slides.children.length;
const dotsContainer = document.getElementById("dots");
const realTotal = total - 1;


function showSlide() {
  slides.style.transition = "0.5s";
  slides.style.transform = `translateX(-${index * 100}%)`;
}

// bikin dots
for (let i = 0; i < realTotal; i++) {
  const dot = document.createElement("span");
  dot.addEventListener("click", () => {
    index = i;
    showSlide();
    updateDots();
  });
  dotsContainer.appendChild(dot);
}

function updateDots() {
  const dots = dotsContainer.children;
  for (let i = 0; i < dots.length; i++) {
    dots[i].classList.remove("active");
  }
  dots[index % realTotal].classList.add("active");
}

function nextSlide() {
  index++;
  showSlide();

  if (index === total - 1) {
    setTimeout(() => {
      slides.style.transition = "none"; // matiin animasi
      index = 0; // balik ke awal
      slides.style.transform = `translateX(0)`;
    }, 500);
  }
}

function prevSlide() {
  if (index === 0) {

    slides.style.transition = "none";
    index = total - 1;
    slides.style.transform = `translateX(-${index * 100}%)`;

    setTimeout(() => {
      slides.style.transition = "0.5s";
      index--;
      showSlide();
    }, 50);
  } else {
    index--;
    showSlide();
  }
}

let autoSlide = setInterval(nextSlide, 3000);

const slider = document.querySelector(".slider");

slider.addEventListener("mouseenter", () => {
  clearInterval(autoSlide);
});

slider.addEventListener("mouseleave", () => {
  autoSlide = setInterval(nextSlide, 3000);
});

let startX = 0;
let endX = 0;

const sliderArea = document.querySelector(".slider");

sliderArea.addEventListener("touchstart", (e) => {
  startX = e.touches[0].clientX;
});

sliderArea.addEventListener("touchend", (e) => {
  endX = e.changedTouches[0].clientX;
  handleSwipe();
});

function handleSwipe() {
  if (startX - endX > 50) {
    nextSlide(); // swipe kiri
  } else if (endX - startX > 50) {
    prevSlide(); // swipe kanan
  }
}

</script>

    <script>
function copyText() {
  const teks = document.getElementById("id").innerText;
  const notif = document.getElementById("notif");

  navigator.clipboard.writeText(teks).then(() => {
    notif.classList.add("show");
    setTimeout(() => {
      notif.classList.remove("show");
    }, 1500);

  })
}
